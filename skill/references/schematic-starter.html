<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<title>Cicrus schematic starter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="../../cicrus.css" rel="stylesheet">
<style>
  /* Schematic-specific tokens — add to cicrus.css if reused */
  :root      { --trace: rgba(255,255,255,0.32); --trace-faint: rgba(255,255,255,0.08); }
  html.light { --trace: rgba(0,0,0,0.40);       --trace-faint: rgba(0,0,0,0.08); }

  body { background: var(--bg-base); margin: 0; font-family: var(--body); }
  .frame { max-width: 920px; margin: 0 auto; padding: 40px 32px; }

  svg.board { display: block; width: 100%; height: auto; }

  .ic-rest        { fill: none; stroke: var(--border-strong); stroke-width: 1; }
  .ic-rest.warm   { stroke: var(--warning); }
  .ic-rest.idle   { stroke: var(--text-disabled); stroke-width: 0.75; stroke-dasharray: 1 5; opacity: 0.55; }

  .card-rule { stroke: var(--rule); stroke-width: 0.5; stroke-dasharray: 2 3; }

  .trace-line  { fill: none; stroke: var(--trace); stroke-width: 0.8;
                 stroke-dasharray: 3 7; animation: flow var(--flow-dur, 2.4s) linear infinite; }
  .trace-line.warm { stroke: var(--warning); stroke-width: 1; }
  .trace-faint     { fill: none; stroke: var(--trace-faint); stroke-width: 0.5; stroke-dasharray: 1 4; }

  .via { fill: var(--text-disabled); opacity: 0.7; }

  .dot         { stroke: none; }
  .dot-success { fill: var(--success); animation: breathe 2.8s ease-in-out infinite; }
  .dot-warning { fill: var(--warning); animation: breathe 1.6s ease-in-out infinite; }
  .dot-idle    { fill: none; stroke: var(--text-disabled); stroke-width: 1; }

  @keyframes flow    { to { stroke-dashoffset: -20; } }
  @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  .t-title       { font-family: var(--label); font-size: 11px; letter-spacing: 0.10em; fill: var(--text-primary); }
  .t-sub         { font-family: var(--label); font-size: 9.5px; fill: var(--text-disabled); }
  .t-stat        { font-family: var(--label); font-size: 9.5px; letter-spacing: 0.10em; fill: var(--text-secondary); }
  .t-stat-strong { font-family: var(--label); font-size: 13px; fill: var(--text-primary); font-variant-numeric: tabular-nums; }
  .t-section     { font-family: var(--label); font-size: 10px; letter-spacing: 0.18em; fill: var(--text-disabled); }
</style>
</head>
<body>
<main class="frame">

<svg class="board" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Cicrus schematic starter</title>

  <!-- INGRESS -->
  <text x="0" y="14" class="t-section">INGRESS</text>
  <line x1="68" y1="10" x2="680" y2="10" stroke="var(--rule)" stroke-width="0.5"/>

  <g>
    <rect x="0" y="26" width="200" height="68" class="ic-rest"/>
    <line x1="0" y1="74" x2="200" y2="74" class="card-rule"/>
    <text x="14" y="48" class="t-title">GATEWAY</text>
    <circle cx="186" cy="44" r="4" class="dot dot-success"/>
    <text x="14" y="68" class="t-stat-strong">12 / 8</text>
    <text x="74" y="68" class="t-stat">RX/TX · MIN</text>
    <text x="14" y="88" class="t-sub">HTTP · ROUTING</text>
  </g>

  <path class="trace-line" style="--flow-dur: 1.8s" d="M100 94 L100 138"/>
  <circle cx="100" cy="138" r="1.6" class="via"/>

  <!-- WORKERS -->
  <text x="0" y="156" class="t-section">WORKERS</text>
  <line x1="68" y1="152" x2="680" y2="152" stroke="var(--rule)" stroke-width="0.5"/>

  <g>
    <rect x="0" y="166" width="200" height="68" class="ic-rest warm"/>
    <line x1="0" y1="214" x2="200" y2="214" class="card-rule"/>
    <text x="14" y="188" class="t-title">PROCESSOR</text>
    <circle cx="186" cy="184" r="4" class="dot dot-warning"/>
    <text x="14" y="208" class="t-stat-strong">3</text>
    <text x="30" y="208" class="t-stat">IN-FLIGHT</text>
    <text x="14" y="228" class="t-sub">UNDER LOAD</text>
  </g>

  <g>
    <rect x="240" y="166" width="200" height="68" class="ic-rest idle"/>
    <line x1="240" y1="214" x2="440" y2="214" class="card-rule"/>
    <text x="254" y="188" class="t-title" style="fill:var(--text-disabled)">REPLICA</text>
    <circle cx="426" cy="184" r="3.5" class="dot-idle"/>
    <text x="254" y="208" class="t-stat-strong" style="fill:var(--text-disabled)">—</text>
    <text x="270" y="208" class="t-stat">STANDBY</text>
    <text x="254" y="228" class="t-sub">FAILOVER · WARM</text>
  </g>

  <path class="trace-line warm" style="--flow-dur: 1.4s" d="M100 234 L100 278"/>
  <path class="trace-faint"                              d="M340 234 L340 278"/>
  <circle cx="100" cy="278" r="1.6" class="via"/>
  <circle cx="340" cy="278" r="1.6" class="via"/>

  <!-- STORAGE -->
  <text x="0" y="296" class="t-section">STORAGE</text>
  <line x1="68" y1="292" x2="680" y2="292" stroke="var(--rule)" stroke-width="0.5"/>
</svg>

</main>
</body>
</html>
