<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Card · todo · Task Board · Cicrus</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="../taskboard.css" />
<style>
  body { padding: 32px; background: var(--black); }
  
</style>
</head>
<body>

<article class="tb-card" style="max-width: 320px;">
  <div class="tb-card-body">
    <div class="tb-card-head">
      <div class="tb-card-heading">
        <span class="tb-card-id">#A-211 · Hiring</span>
        <h3 class="tb-card-title">Compile open-role pipeline for Q4 hiring review</h3>
      </div>
      <button type="button" class="tb-card-action">Run
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 2 L10 6 L3 10 Z"></path></svg>
      </button>
    </div>
    <div class="tb-card-meter"><span>not started</span><span>est. ~8 steps</span></div>
  </div>
</article>
</body>
</html>
