<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Card · running · Task Board · Cicrus</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="../taskboard.css" />
<style>
  body { padding: 32px; background: var(--black); }
  
</style>
</head>
<body>

<article class="tb-card tb-card--running" style="max-width: 320px;">
  <div class="tb-card-body">
    <div class="tb-card-head">
      <div class="tb-card-heading">
        <span class="tb-card-id">#A-209 · Onboarding</span>
        <h3 class="tb-card-title">Draft Q3 contractor onboarding checklist for EU entities</h3>
      </div>
      <button type="button" class="tb-card-action tb-card-action--running">Running
        <svg viewBox="0 0 12 12" fill="currentColor"><rect x="3" y="2" width="2" height="8" rx="0.4"></rect><rect x="7" y="2" width="2" height="8" rx="0.4"></rect></svg>
      </button>
    </div>
    <div class="tb-card-progress tb-card-progress--warning" style="--p: 58%;"></div>
    <div class="tb-card-meter"><span><b>step 7</b> / 12</span><span>ETA 2m 14s</span></div>
  </div>
</article>
</body>
</html>
