<!DOCTYPE html>

<meta charset="UTF-8" />
<title>Compare · LMS · Cicrus</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="../lms.css" />
<style>
  body { padding: 32px; background: var(--black); }
  
</style>
</head>
<body>

<div class="lms-compare">
  <div class="lms-compare--do">
    <h5>Do</h5>
    <p>Read rows top to bottom. One trace at a time. Pick a single request path and finish it before starting another.</p>
  </div>
  <div class="lms-compare--dont">
    <h5>Don't</h5>
    <p>Don't try to memorize the whole diagram before reading a trace. Don't scan sideways for "where this fits." The rows already told you.</p>
  </div>
</div>

</body>
