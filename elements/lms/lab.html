<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lab · LMS · Cicrus</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="../lms.css" />
<style>
  body { padding: 32px; background: var(--black); }
  
</style>
</head>
<body>

<section class="lms-lab">
  <header class="lms-lab-head">
    <span class="lms-lab-title">Lab · Trace a request</span>
    <span class="lms-lab-meta">~6 min · self-checked</span>
  </header>
  <div class="lms-lab-body">
    <p>The system above received a request for <code>entity_id: "br-ltda"</code> at <code>14:02:17</code>. Trace the request from the API gateway to the database. List every card it passes through, in order.</p>
    <div class="lms-lab-input">
      <span class="prompt">→</span>
      <input type="text" placeholder="api.gateway → payroll.sync → ..." />
    </div>
  </div>
</section>

</body>
