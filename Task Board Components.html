<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Board · Components · Cicrus</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  body { background: #141414; color: var(--text-primary); }
  .frm {
    width: 100%; height: 100%; border: 0;
    display: block; background: var(--black);
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const F = ({ src, title }) =>
    <iframe className="frm" src={src} title={title} loading="lazy" />;

  function App() {
    return (
      <DesignCanvas title="Task Board · Components">

        <DCSection id="chrome" title="App chrome">
          <DCArtboard id="topbar"   label="Top bar"        width={1280} height={72}>
            <F src="elements/taskboard/topbar.html" title="Top bar" />
          </DCArtboard>
          <DCArtboard id="sidebar"  label="Sidebar"        width={320} height={640}>
            <F src="elements/taskboard/sidebar.html" title="Sidebar" />
          </DCArtboard>
          <DCArtboard id="footer"   label="Footer"         width={1280} height={120}>
            <F src="elements/taskboard/footer.html" title="Footer" />
          </DCArtboard>
        </DCSection>

        <DCSection id="header" title="Page header & data">
          <DCArtboard id="header"   label="Page header"    width={1080} height={180}>
            <F src="elements/taskboard/header.html" title="Header" />
          </DCArtboard>
          <DCArtboard id="toolbar"  label="Toolbar"        width={1080} height={120}>
            <F src="elements/taskboard/toolbar.html" title="Toolbar" />
          </DCArtboard>
          <DCArtboard id="stats"    label="Stats strip"    width={1280} height={140}>
            <F src="elements/taskboard/stats.html" title="Stats" />
          </DCArtboard>
        </DCSection>

        <DCSection id="kanban" title="Kanban">
          <DCArtboard id="col-empty"   label="Empty column"           width={340} height={460}>
            <F src="elements/taskboard/col-empty.html" title="Empty column" />
          </DCArtboard>
          <DCArtboard id="col-running" label="Running column · 2 cards" width={340} height={460}>
            <F src="elements/taskboard/col-running.html" title="Running column" />
          </DCArtboard>
          <DCArtboard id="status-dots" label="Status dot legend"      width={340} height={260}>
            <F src="elements/taskboard/status-dots.html" title="Status dots" />
          </DCArtboard>
        </DCSection>

        <DCSection id="cards" title="Task cards · states">
          <DCArtboard id="card-todo"    label="Todo · idle"      width={380} height={200}>
            <F src="elements/taskboard/card-todo.html" title="Card · todo" />
          </DCArtboard>
          <DCArtboard id="card-running" label="Running · with glow + progress" width={380} height={220}>
            <F src="elements/taskboard/card-running.html" title="Card · running" />
          </DCArtboard>
          <DCArtboard id="card-review"  label="Review · awaiting" width={380} height={200}>
            <F src="elements/taskboard/card-review.html" title="Card · review" />
          </DCArtboard>
          <DCArtboard id="card-done"    label="Done · archived"   width={380} height={200}>
            <F src="elements/taskboard/card-done.html" title="Card · done" />
          </DCArtboard>
        </DCSection>

        <DCSection id="detail" title="Detail panel">
          <DCArtboard id="side-panel" label="Side panel · running task" width={720} height={920}>
            <F src="elements/taskboard/side-panel.html" title="Side panel" />
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
