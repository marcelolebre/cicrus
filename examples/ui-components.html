<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UI Components · Cicrus</title>
<link rel="stylesheet" href="../src/cicrus.css" />
<style>
  body { background: #141414; color: var(--text-primary); }
  .frm {
    width: 100%; height: 100%; border: 0;
    display: block; background: var(--black);
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const F = ({ src, title }) =>
    <iframe className="frm" src={src} title={title} loading="lazy" />;

  function App() {
    return (
      <DesignCanvas title="UI Components">

        <DCSection id="chrome" title="Chrome">
          <DCArtboard id="version-tag"   label="Version tag"   width={280} height={80}>
            <F src="previews/ui/version-tag.html" title="Version tag" />
          </DCArtboard>
          <DCArtboard id="tab-link"      label="Tab link"      width={280} height={80}>
            <F src="previews/ui/tab-link.html" title="Tab link" />
          </DCArtboard>
          <DCArtboard id="theme-toggle"  label="Theme toggle"  width={200} height={80}>
            <F src="previews/ui/theme-toggle.html" title="Theme toggle" />
          </DCArtboard>
        </DCSection>

        <DCSection id="header" title="Page header">
          <DCArtboard id="page-title"    label="Page title"    width={520} height={140}>
            <F src="previews/ui/page-title.html" title="Page title" />
          </DCArtboard>
          <DCArtboard id="page-meta"     label="Page meta"     width={420} height={100}>
            <F src="previews/ui/page-meta.html" title="Page meta" />
          </DCArtboard>
        </DCSection>

        <DCSection id="toolbar" title="Toolbar">
          <DCArtboard id="filter-button" label="Filter button" width={220} height={100}>
            <F src="previews/ui/filter-button.html" title="Filter button" />
          </DCArtboard>
          <DCArtboard id="search-pill"   label="Search pill"   width={520} height={100}>
            <F src="previews/ui/search-pill.html" title="Search pill" />
          </DCArtboard>
        </DCSection>

        <DCSection id="stats" title="Stats">
          <DCArtboard id="stat-tile"     label="Stat tile"     width={280} height={160}>
            <F src="previews/ui/stat-tile.html" title="Stat tile" />
          </DCArtboard>
          <DCArtboard id="status-dot"    label="Status dot"    width={240} height={80}>
            <F src="previews/ui/status-dot.html" title="Status dot" />
          </DCArtboard>
        </DCSection>

        <DCSection id="board" title="Board">
          <DCArtboard id="column-header" label="Column header" width={320} height={100}>
            <F src="previews/ui/column-header.html" title="Column header" />
          </DCArtboard>
          <DCArtboard id="column-empty"  label="Empty column"  width={320} height={260}>
            <F src="previews/ui/column-empty.html" title="Empty column" />
          </DCArtboard>
        </DCSection>

        <DCSection id="cards" title="Cards · states">
          <DCArtboard id="card-todo"     label="Todo · idle"                    width={380} height={180}>
            <F src="previews/ui/card-todo.html" title="Card · todo" />
          </DCArtboard>
          <DCArtboard id="card-running"  label="Running · with glow + progress" width={380} height={200}>
            <F src="previews/ui/card-running.html" title="Card · running" />
          </DCArtboard>
          <DCArtboard id="card-review"   label="Review · awaiting"              width={380} height={180}>
            <F src="previews/ui/card-review.html" title="Card · review" />
          </DCArtboard>
          <DCArtboard id="card-done"     label="Done · archived"                width={380} height={180}>
            <F src="previews/ui/card-done.html" title="Card · done" />
          </DCArtboard>
        </DCSection>

        <DCSection id="sidebar" title="Sidebar">
          <DCArtboard id="nav-section-title" label="Nav section title" width={280} height={80}>
            <F src="previews/ui/nav-section-title.html" title="Nav section title" />
          </DCArtboard>
          <DCArtboard id="nav-item"          label="Nav item"          width={280} height={100}>
            <F src="previews/ui/nav-item.html" title="Nav item" />
          </DCArtboard>
          <DCArtboard id="nav-archive"       label="Archive button"    width={220} height={80}>
            <F src="previews/ui/nav-archive.html" title="Archive button" />
          </DCArtboard>
        </DCSection>

        <DCSection id="panel" title="Detail panel">
          <DCArtboard id="panel-header"        label="Panel header"        width={680} height={120}>
            <F src="previews/ui/panel-header.html" title="Panel header" />
          </DCArtboard>
          <DCArtboard id="panel-title"         label="Panel title"         width={520} height={120}>
            <F src="previews/ui/panel-title.html" title="Panel title" />
          </DCArtboard>
          <DCArtboard id="panel-status-pill"   label="Status pill"         width={420} height={100}>
            <F src="previews/ui/panel-status-pill.html" title="Status pill" />
          </DCArtboard>
          <DCArtboard id="panel-progress"      label="Panel progress"      width={520} height={100}>
            <F src="previews/ui/panel-progress.html" title="Panel progress" />
          </DCArtboard>
          <DCArtboard id="panel-section-title" label="Panel section title" width={420} height={80}>
            <F src="previews/ui/panel-section-title.html" title="Panel section title" />
          </DCArtboard>
          <DCArtboard id="timeline-item"       label="Timeline item"       width={520} height={120}>
            <F src="previews/ui/timeline-item.html" title="Timeline item" />
          </DCArtboard>
          <DCArtboard id="detail-row"          label="Detail row"          width={520} height={100}>
            <F src="previews/ui/detail-row.html" title="Detail row" />
          </DCArtboard>
          <DCArtboard id="output-block"        label="Output block"        width={520} height={180}>
            <F src="previews/ui/output-block.html" title="Output block" />
          </DCArtboard>
          <DCArtboard id="panel-button"        label="Panel button"        width={420} height={100}>
            <F src="previews/ui/panel-button.html" title="Panel button" />
          </DCArtboard>
        </DCSection>

        <DCSection id="footer" title="Footer">
          <DCArtboard id="footer-stat" label="Footer stat" width={420} height={80}>
            <F src="previews/ui/footer-stat.html" title="Footer stat" />
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
