<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Card · running · Cicrus</title>
<link rel="stylesheet" href="../../../src/cicrus.css" />
<style>body { padding: 32px; background: var(--black); }</style>
</head>
<body>
<article class="c-item c-item--running" style="max-width: 320px;">
  <div class="c-item-body">
    <div class="c-item-head">
      <div class="c-item-heading">
        <span class="c-item-id">#T-209 · Research</span>
        <h3 class="c-item-title">Draft a one-page summary of the Q3 user interviews</h3>
      </div>
      <button type="button" class="c-item-action c-item-action--running">Running
        <svg viewBox="0 0 12 12" fill="currentColor"><rect x="3" y="2" width="2" height="8" rx="0.4"></rect><rect x="7" y="2" width="2" height="8" rx="0.4"></rect></svg>
      </button>
    </div>
    <div class="c-item-progress c-item-progress--warning" style="--p: 58%;"></div>
    <div class="c-item-meter"><span><b>step 7</b> / 12</span><span>ETA 2m 14s</span></div>
  </div>
</article>
</body>
</html>
