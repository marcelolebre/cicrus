<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Stat tile · Cicrus</title>
<link rel="stylesheet" href="../../../src/cicrus.css" />
<style>body { padding: 32px; background: var(--black); }</style>
</head>
<body>
<section class="c-stats" style="grid-template-columns: 1fr; border-top:0; border-bottom:0; background: transparent;">
  <div class="c-stat" style="background: var(--black);">
    <span class="c-stat-label">Running</span>
    <span class="c-stat-value c-stat-value--warning">2</span>
    <div class="c-stat-bar">
      <span class="warning"></span><span class="warning"></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>
</section>
</body>
</html>
