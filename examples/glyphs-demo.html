<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cicrus state glyphs starter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #060606;
    --text-disabled: #8F8F8F;
    --text-secondary: #B8B8B8;
    --accent: #F0353D;   /* dark-mode alarm red — matches tokens.css */
    --success: #4A9E5C;  /* dark-mode green */
    --font-mono: 'Space Mono', monospace;
  }

  html, body { background: var(--black); color: #f5f5f5; min-height: 100vh; }
  body { display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

  .stage { background: var(--black); border-radius: 16px; padding: 28px 22px 22px; max-width: 720px; }
  .row { display: flex; gap: 28px; justify-content: center; align-items: flex-start; flex-wrap: wrap; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .glyph { width: 200px; height: 170px; }

  .label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    margin: 0;
  }
  .l-running { color: var(--text-secondary); }
  .l-stopped { color: var(--text-disabled); }
  .l-broken  { color: var(--accent); }
</style>
</head>
<body>
<div class="stage">
  <div class="row">
    <div class="cell">
      <div class="glyph" id="g-running"></div>
      <p class="label l-running">running</p>
    </div>
    <div class="cell">
      <div class="glyph" id="g-stopped"></div>
      <p class="label l-stopped">stopped</p>
    </div>
    <div class="cell">
      <div class="glyph" id="g-broken"></div>
      <p class="label l-broken">broken</p>
    </div>
  </div>
</div>
<script type="module">
  import { mountGlyph } from '../src/glyphs.js';
  mountGlyph(document.getElementById('g-running'), { state: 'running' });
  mountGlyph(document.getElementById('g-stopped'), { state: 'stopped' });
  mountGlyph(document.getElementById('g-broken'),  { state: 'broken' });
</script>
</body>
</html>
